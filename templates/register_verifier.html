<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Verifier | DNA Honey</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="bg">
  <div class="overlay"></div>
  <div class="center-content">
    <div class="form-card">
      <h2>New Verifier Registration</h2>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash">
            {% for category, message in messages %}
              <div class="{{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="post">
        <label>Username</label>
        <input type="text" name="username" required />

        <label>Password</label>
        <input type="password" name="password" required />

        <label>Confirm Password</label>
        <input type="password" name="confirm" required />

        <button type="submit">Register</button>
      </form>

      <p style="text-align: center; margin-top: 20px;">
        <a href="{{ url_for('login_verifier') }}" style="color: #00d4ff; text-decoration: none;">Back to Login</a>
      </p>
      <p style="text-align: center; margin-top: 10px;">
        <a href="{{ url_for('index') }}" style="color: #00d4ff; text-decoration: none;">← Back to Home</a>
      </p>
    </div>
  </div>
</body>
</html>
