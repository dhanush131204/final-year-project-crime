<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifier Login | Crime Secure</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body style="display: flex; align-items: center; justify-content: center; background: var(--bg-dark-primary);">

  <div class="alert-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{ 'success' if category == 'success' else 'error' }}">
      {{ message }}
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}
  </div>

  <div class="glass-panel auth-card" style="border-color: var(--accent-secondary);">
    <div style="text-align: center; margin-bottom: 2rem;">
      <div
        style="display: inline-block; padding: 10px; background: rgba(14,165,233,0.1); border-radius: 12px; margin-bottom: 1rem;">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
          stroke="var(--accent-secondary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="8.5" cy="7" r="4"></circle>
          <polyline points="17 11 19 13 23 9"></polyline>
        </svg>
      </div>
      <h2 class="title-cyan" style="color: var(--accent-secondary);">VERIFIER ACCESS</h2>
      <p style="color: var(--text-muted); font-size: 0.875rem;">Authorized security personnel only</p>
    </div>

    <form method="post">
      <div class="input-group">
        <label class="input-label">Verifier ID</label>
        <input type="text" name="username" class="styled-input" placeholder="Username" required />
      </div>

      <div class="input-group">
        <label class="input-label">Access Token</label>
        <input type="password" name="password" class="styled-input" placeholder="••••••••" required />
      </div>

      <button type="submit" class="btn-premium"
        style="background: linear-gradient(135deg, var(--accent-secondary), #0369a1);">VERIFY IDENTITY</button>
    </form>

    <div style="text-align: center; margin-top: 2rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
      <p style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1rem;">New to the system?</p>
      <a href="{{ url_for('register_verifier') }}"
        style="color: var(--accent-secondary); font-weight: 600; display: block; margin-bottom: 1rem;">Request New
        Registration</a>
      <a href="{{ url_for('index') }}" class="btn-ghost"
        style="font-size: 0.8rem; padding: 0.5rem; text-decoration: none;">← BACK TO HOME</a>
    </div>
  </div>
</body>

</html>
