<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | SENTINEL FORENSIC HUB</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body style="display: flex; align-items: center; justify-content: center; background: var(--bg-dark-primary);">

  <div class="alert-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{ 'success' if category == 'success' else 'error' }}">
      {{ message }}
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}
  </div>

  <div class="glass-panel auth-card">
    <div style="text-align: center; margin-bottom: 2rem;">
      <div
        style="display: inline-block; padding: 10px; background: rgba(0,242,255,0.1); border-radius: 12px; margin-bottom: 1rem;">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
          stroke="var(--accent-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h2 class="title-cyan">ADMIN CONSOLE</h2>
      <p style="color: var(--text-muted); font-size: 0.875rem;">Identity verification required for access</p>
    </div>

    <form method="post">
      <div class="input-group">
        <label class="input-label">Terminal ID (Username)</label>
        <input type="text" name="username" class="styled-input" placeholder="Enter admin username" required />
      </div>

      <div class="input-group">
        <label class="input-label">Access Token (Password)</label>
        <input type="password" name="password" class="styled-input" placeholder="••••••••" required />
      </div>

      <button type="submit" class="btn-premium">AUTHORIZE ACCESS</button>
    </form>

    <div style="text-align: center; margin-top: 2rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
      <a href="{{ url_for('index') }}" class="btn-ghost"
        style="font-size: 0.8rem; padding: 0.5rem; text-decoration: none;">
        ← BACK TO HOME
      </a>
    </div>
  </div>
</body>

</html>
