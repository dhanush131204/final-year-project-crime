<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register Verifier - Forensic System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="luxury-dark">
    <div style="height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div class="auth-card">
            <h2 style="margin-bottom: 2rem;">New <span>Verifier</span></h2>
            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for message in messages %}
            <p style="color: #ff4d4d; margin-bottom: 1rem;">{{ message }}</p>
            {% endfor %}
            {% endif %}
            {% endwith %}
            <form method="POST">
                <div>
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>
                <div>
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <div>
                    <label>Confirm Password</label>
                    <input type="password" name="confirm" required>
                </div>
                <button type="submit" class="main-btn"
                    style="width: 100%; border: none; cursor: pointer;">Register</button>
            </form>
            <p style="margin-top: 2rem; font-size: 0.8rem; text-align: center;"><a
                    href="{{ url_for('login_verifier') }}" style="color: #666; text-decoration: none;">Already have an
                    account? Login</a></p>
        </div>
    </div>
</body>

</html>
